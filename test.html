<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <title>Trivia!</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #f3f1ea;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(91, 127, 199, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 132, 80, 0.08) 0%, transparent 40%);
            color: #29282a;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .app {
            max-width: 640px;
            margin: 0 auto;
        }

        /* ---- top bar ---- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: #29282a;
        }

        .brand span {
            color: #d4844f;
        }

        .pill {
            background-color: #29282a;
            color: #f3f1ea;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
        }

        /* ---- progress ---- */
        .progress-track {
            background-color: #e4e0d4;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            background-color: #d4844f;
            background-image: linear-gradient(90deg, #d4844f, #e0a96f);
            height: 100%;
            width: 0%;
            transition: width 0.35s ease;
        }

        /* ---- card ---- */
        .card {
            background-color: #fffdf9;
            border: 1px solid #e4e0d4;
            border-radius: 14px;
            padding: 2rem 1.75rem;
            box-shadow: 0 4px 18px rgba(40, 30, 10, 0.06);
            min-height: 320px;
            display: none;
            flex-direction: column;
        }

        .card.active {
            display: flex;
            animation: fadein 0.3s ease;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qmeta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .qnum {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #a39a82;
        }

        .qtype {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background-color: #ece6d6;
            color: #7a6a45;
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
        }

        .qtext {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.55;
            color: #1f1e20;
            margin: 0 0 1.5rem 0;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .opt {
            text-align: left;
            background-color: #fffdf9;
            border: 1.5px solid #e0dac8;
            border-radius: 9px;
            padding: 0.7rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #29282a;
            cursor: pointer;
            transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.1s ease;
        }

        .opt:hover:not(:disabled) {
            border-color: #d4844f;
            background-color: #fdf6ee;
        }

        .opt:active:not(:disabled) {
            transform: scale(0.99);
        }

        .opt:disabled {
            cursor: default;
        }

        .opt.correct {
            border-color: #6fa97e;
            background-color: #e7f3ea;
            color: #2c5e36;
        }

        .opt.incorrect {
            border-color: #cf7466;
            background-color: #fbe9e6;
            color: #8a3a2e;
        }

        .freerow {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .freerow input[type="text"] {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid #e0dac8;
            border-radius: 9px;
            background-color: #fffdf9;
        }

        .freerow input[type="text"]:focus {
            outline: none;
            border-color: #d4844f;
        }

        .freerow input[type="text"]:disabled {
            opacity: 0.7;
        }

        .freerow button {
            background-color: #29282a;
            color: #fffdf9;
            border: none;
            border-radius: 9px;
            padding: 0 1.3rem;
            font-weight: 600;
            cursor: pointer;
        }

        .freerow button:hover:not(:disabled) {
            background-color: #45434a;
        }

        .freerow button:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .feedback {
            font-size: 0.9rem;
            font-weight: 600;
            min-height: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .feedback.good {
            color: #2c7a45;
        }

        .feedback.bad {
            color: #a33a3a;
        }

        .hintline {
            margin-top: auto;
            padding-top: 0.5rem;
        }

        .hintbtn {
            background: none;
            border: none;
            color: #a3873f;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-decoration-style: dotted;
        }

        .hinttext {
            font-style: italic;
            font-size: 0.85rem;
            color: #6b6458;
            margin-top: 0.5rem;
            padding-left: 0.65rem;
            border-left: 3px solid #e0c98a;
            display: none;
        }

        /* ---- nav controls ---- */
        .navrow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }

        .navbtn {
            background-color: transparent;
            border: 1.5px solid #29282a;
            color: #29282a;
            border-radius: 9px;
            padding: 0.55rem 1.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .navbtn:hover:not(:disabled) {
            background-color: #29282a;
            color: #fffdf9;
        }

        .navbtn:disabled {
            opacity: 0.35;
            cursor: default;
        }

        .navbtn.primary {
            background-color: #d4844f;
            border-color: #d4844f;
            color: #fffdf9;
        }

        .navbtn.primary:hover:not(:disabled) {
            background-color: #bf7140;
        }

        /* ---- results screen ---- */
        .results {
            display: none;
            text-align: center;
            background-color: #fffdf9;
            border: 1px solid #e4e0d4;
            border-radius: 14px;
            padding: 3rem 2rem;
            box-shadow: 0 4px 18px rgba(40, 30, 10, 0.06);
        }

        .results.active {
            display: block;
            animation: fadein 0.4s ease;
        }

        .results .bigscore {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            color: #d4844f;
            margin: 0.5rem 0;
        }

        .results p {
            color: #5a5650;
            font-size: 0.95rem;
        }

        .results .restartbtn {
            margin-top: 1.5rem;
            background-color: #29282a;
            color: #fffdf9;
            border: none;
            border-radius: 9px;
            padding: 0.7rem 1.6rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .results .restartbtn:hover {
            background-color: #45434a;
        }

        .breakdown {
            text-align: left;
            margin-top: 1.75rem;
            border-top: 1px solid #e4e0d4;
            padding-top: 1.25rem;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 0.4rem 0;
            border-bottom: 1px dashed #ece6d6;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .bi-mark {
            font-weight: 700;
        }

        .bi-mark.good {
            color: #2c7a45;
        }

        .bi-mark.bad {
            color: #a33a3a;
        }
    </style>
</head>

<body>
    <div class="app">

        <div class="topbar">
            <div class="brand">Trivia<span>!</span></div>
            <div class="pill" id="scorePill">Score 0</div>
        </div>

        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- question cards get injected here -->
        <div id="cardHolder"></div>

        <div class="navrow" id="navRow" style="display:none;">
            <button class="navbtn" id="prevBtn">← Back</button>
            <button class="navbtn primary" id="nextBtn">Next →</button>
        </div>

        <div class="results" id="results">
            <div
                style="font-size:0.85rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#a39a82;">
                Quiz complete</div>
            <div class="bigscore" id="bigScore">0 / 0</div>
            <p id="resultMsg"></p>
            <button class="restartbtn" id="restartBtn">Play Again</button>
            <div class="breakdown" id="breakdown"></div>
        </div>

    </div>

    <script>
        const questions = [
            {
                type: 'mcq',
                text: 'A projectile is fired at an angle of 30° with the horizontal. At what angle with the horizontal will the projectile be moving at half of its maximum height?',
                options: [
                    { label: '0°', correct: false },
                    { label: 'tan⁻¹(1/√6)', correct: true },
                    { label: 'tan⁻¹(1/√5)', correct: false },
                    { label: '60°', correct: false }
                ],
                hint: 'Think about what "half of max height" implies about the velocity components.'
            },
            {
                type: 'free',
                text: 'A liquid of density 600 kg/m³ flows steadily in a tube of varying cross-section. The cross-section at point A is 1.0 cm² and at B is 20 mm². Both points are in the same horizontal plane, and the speed at A is 10 cm/s. The difference in pressure between A and B is ____ Pa.',
                answer: 72,
                hint: "Use the continuity equation to find the speed at B, then Bernoulli's equation for the pressure difference."
            }
        ];

        let current = 0;
        let score = 0;
        const userAnswers = new Array(questions.length).fill(null); // {correct: bool, given: string}

        const cardHolder = document.getElementById('cardHolder');
        const progressFill = document.getElementById('progressFill');
        const scorePill = document.getElementById('scorePill');
        const navRow = document.getElementById('navRow');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const results = document.getElementById('results');

        function buildCards() {
            questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = 'card' + i;

                let inner = `
                    <div class="qmeta">
                        <span class="qnum">Question ${i + 1} of ${questions.length}</span>
                        <span class="qtype">${q.type === 'mcq' ? 'Multiple Choice' : 'Free Response'}</span>
                    </div>
                    <p class="qtext">${q.text}</p>
                `;

                if (q.type === 'mcq') {
                    inner += `<div class="options">`;
                    q.options.forEach((opt, oi) => {
                        inner += `<button type="button" class="opt" data-idx="${oi}">${opt.label}</button>`;
                    });
                    inner += `</div>`;
                } else {
                    inner += `
                        <div class="freerow">
                            <input type="text" id="freeInput${i}" placeholder="Type your answer">
                            <button type="button" id="freeSubmit${i}">Submit</button>
                        </div>
                    `;
                }

                inner += `<p class="feedback" id="feedback${i}"></p>`;
                inner += `
                    <div class="hintline">
                        <button type="button" class="hintbtn" id="hintBtn${i}">Need a hint?</button>
                        <p class="hinttext" id="hintText${i}">${q.hint}</p>
                    </div>
                `;

                card.innerHTML = inner;
                cardHolder.appendChild(card);
            });
        }

        function wireCard(i) {
            const q = questions[i];
            const feedback = document.getElementById('feedback' + i);

            const hintBtn = document.getElementById('hintBtn' + i);
            const hintText = document.getElementById('hintText' + i);
            hintBtn.onclick = () => {
                hintText.style.display = hintText.style.display === 'block' ? 'none' : 'block';
            };

            if (q.type === 'mcq') {
                const card = document.getElementById('card' + i);
                const buttons = card.querySelectorAll('.opt');
                buttons.forEach(btn => {
                    btn.onclick = () => {
                        if (userAnswers[i] !== null) return;
                        const idx = parseInt(btn.getAttribute('data-idx'));
                        const isCorrect = q.options[idx].correct;
                        buttons.forEach((b, bi) => {
                            b.disabled = true;
                            if (q.options[bi].correct) b.classList.add('correct');
                        });
                        if (!isCorrect) btn.classList.add('incorrect');
                        feedback.textContent = isCorrect ? 'Correct!' : 'Not quite.';
                        feedback.className = 'feedback ' + (isCorrect ? 'good' : 'bad');
                        userAnswers[i] = { correct: isCorrect, given: q.options[idx].label };
                        if (isCorrect) score++;
                        refreshChrome();
                    };
                });
            } else {
                const input = document.getElementById('freeInput' + i);
                const submitBtn = document.getElementById('freeSubmit' + i);
                const submit = () => {
                    if (userAnswers[i] !== null) return;
                    if (input.value.trim() === '') return;
                    const val = parseFloat(input.value);
                    const isCorrect = val === q.answer;
                    input.disabled = true;
                    submitBtn.disabled = true;
                    feedback.textContent = isCorrect ? 'Correct!' : ('Not quite — answer: ' + q.answer);
                    feedback.className = 'feedback ' + (isCorrect ? 'good' : 'bad');
                    userAnswers[i] = { correct: isCorrect, given: input.value };
                    if (isCorrect) score++;
                    refreshChrome();
                };
                submitBtn.onclick = submit;
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') submit();
                });
            }
        }

        function showCard(i) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.getElementById('card' + i).classList.add('active');
            navRow.style.display = 'flex';
            prevBtn.disabled = i === 0;
            nextBtn.textContent = i === questions.length - 1 ? 'Finish' : 'Next →';
            progressFill.style.width = (((i) / questions.length) * 100) + '%';
        }

        function refreshChrome() {
            scorePill.textContent = 'Score ' + score;
        }

        function showResults() {
            navRow.style.display = 'none';
            cardHolder.style.display = 'none';
            results.classList.add('active');
            progressFill.style.width = '100%';

            document.getElementById('bigScore').textContent = score + ' / ' + questions.length;
            const pct = Math.round((score / questions.length) * 100);
            let msg = '';
            if (pct === 100) msg = 'Perfect score! Nice work.';
            else if (pct >= 50) msg = 'Good effort — keep practicing!';
            else msg = 'Worth another look at these topics.';
            document.getElementById('resultMsg').textContent = msg + ' (' + pct + '%)';

            const breakdown = document.getElementById('breakdown');
            breakdown.innerHTML = '';
            questions.forEach((q, i) => {
                const ans = userAnswers[i];
                const row = document.createElement('div');
                row.className = 'breakdown-item';
                row.innerHTML = `<span>Question ${i + 1}</span><span class="bi-mark ${ans.correct ? 'good' : 'bad'}">${ans.correct ? 'Correct' : 'Incorrect'}</span>`;
                breakdown.appendChild(row);
            });
        }

        nextBtn.onclick = () => {
            if (current < questions.length - 1) {
                current++;
                showCard(current);
            } else {
                showResults();
            }
        };

        prevBtn.onclick = () => {
            if (current > 0) {
                current--;
                showCard(current);
            }
        };

        document.getElementById('restartBtn').onclick = () => {
            location.reload();
        };

        buildCards();
        questions.forEach((q, i) => wireCard(i));
        showCard(0);
        refreshChrome();
    </script>
</body>

</html>
